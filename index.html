<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>體感/鍵盤雙模 Flappy Bird (萬重水管光速版)</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050505;
            font-family: sans-serif;
        }
        canvas {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 28px;
            font-weight: bold;
            color: #00ffff;
            text-align: center;
            z-index: 10;
        }
        #cameraSelectContainer {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 20;
            background: rgba(0, 0, 0, 0.85);
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #00ffff;
            display: none;
        }
        #cameraSelectContainer label {
            color: #fff;
            font-size: 14px;
            margin-right: 8px;
        }
        #cameraSelect {
            padding: 4px 8px;
            font-size: 14px;
            background: #111;
            color: #fff;
            border: 1px solid #00ffff;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="loading">⚠️ 正在加載無縫多重水管極限模型... ⚠️</div>
    
    <div id="cameraSelectContainer">
        <label for="cameraSelect">📷 選擇鏡頭:</label>
        <select id="cameraSelect"></select>
    </div>

    <video id="video" width="640" height="480" style="display: none;" autoplay playsinline></video>
    <canvas id="gameCanvas" width="1280" height="720"></canvas>

    <script>
        const videoElement = document.getElementById('video');
        const canvasElement = document.getElementById('gameCanvas');
        const canvasCtx = canvasElement.getContext('2d');
        const loadingText = document.getElementById('loading');
        const cameraSelectContainer = document.getElementById('cameraSelectContainer');
        const cameraSelect = document.getElementById('cameraSelect');

        const STATES = {
            LOADING: 'LOADING',
            TESTING: 'TESTING',
            PLAYING: 'PLAYING',
            GAMEOVER: 'GAMEOVER'
        };
        let currentState = STATES.LOADING;

        // --- 【萬重水管時空參數】 ---
        const WIDTH = canvasElement.width;
        const HEIGHT = canvasElement.height;
        const GROUND_HEIGHT = 50; 
        
        // 物理極限：重力 2.6，跳躍衝力 -26
        let bird = { x: WIDTH / 3, y: HEIGHT / 2, radius: 20, velocity: 0, gravity: 2.6, flapPower: -26 };
        
        // 水管改用陣列控制，達成多水管同時排列
        let pipes = [];
        const PIPE_CONFIG = {
            width: 90,
            gap: 160,          // 穿過空隙依然是極窄的 160
            speed: 24,         // 暴速 24
            spawnDist: 340     // 每隔 340 像素就強行塞一根新水管，讓畫面上隨時滿滿都是水管！
        };
        
        let score = 0;
        let isPalmsTouching = false; 
        let testSuccessTimer = 0;
        let audioCtx = null;

        // 起立與無敵狀態變數
        let baseHipKneeDist = 0.18;      
        let wasStandingUp = false;       
        let invincibleEndTime = 0;       
        let cooldownEndTime = 0;         

        const PIP = { x: 30, y: 30, width: 280, height: 157 }; 
        let currentStream = null; 

        function playJumpSound() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(450, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1000, audioCtx.currentTime + 0.06);
                gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.06);
                osc.start(); osc.stop(audioCtx.currentTime + 0.06);
            } catch (e) {}
        }

        function playShieldSound() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'sine'; 
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(1400, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            } catch (e) {}
        }

        function triggerShield() {
            const currentTime = performance.now();
            if (currentTime > cooldownEndTime) {
                invincibleEndTime = currentTime + 4000; 
                cooldownEndTime = currentTime + 12000;  // CD縮短到 12 秒，高密度水管下必備
                playShieldSound();
            }
        }

        function triggerFlap() {
            bird.velocity = bird.flapPower;
            playJumpSound(); 
        }

        // 產生單一水管的公式
        function createNewPipe(startX) {
            let topHeight = Math.floor(Math.random() * (HEIGHT - GROUND_HEIGHT - PIPE_CONFIG.gap - 200)) + 100;
            return {
                x: startX,
                topHeight: topHeight,
                passed: false
            };
        }

        function resetGame() {
            bird.y = HEIGHT / 2;
            bird.velocity = 0;
            score = 0;
            invincibleEndTime = 0;
            cooldownEndTime = 0;
            wasStandingUp = false;
            
            // 初始連續鋪設複數水管，確保開局就超多
            pipes = [];
            pipes.push(createNewPipe(WIDTH));
            pipes.push(createNewPipe(WIDTH + PIPE_CONFIG.spawnDist));
            pipes.push(createNewPipe(WIDTH + PIPE_CONFIG.spawnDist * 2));
            
            currentState = STATES.PLAYING;
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        }

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'r' && currentState === STATES.GAMEOVER) {
                resetGame();
            }
            if (currentState === STATES.PLAYING) {
                if (e.key === ' ' || key === 'spacebar') { 
                    e.preventDefault(); 
                    triggerFlap();
                }
                if (e.key === 'ArrowUp') { 
                    e.preventDefault();
                    triggerShield();
                }
            }
            if (currentState === STATES.TESTING && (e.key === ' ' || e.key === 'ArrowUp')) {
                resetGame();
            }
        });

        const pose = new Pose({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
        });

        pose.setOptions({
            modelComplexity: 1,
            smoothLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        pose.onResults((results) => {
            if (currentState === STATES.LOADING) {
                loadingText.style.display = 'none';
                cameraSelectContainer.style.display = 'block'; 
                currentState = STATES.TESTING;
            }

            const currentTime = performance.now();

            // 1. 背景
            canvasCtx.fillStyle = '#0a0518';
            canvasCtx.fillRect(0, 0, WIDTH, HEIGHT);

            // 2. 骨架偵測
            let palmsCollided = false;
            let rawLeftPalm = null;
            let isStandingNow = false;

            if (results.poseLandmarks) {
                const landmarks = results.poseLandmarks;
                const leftPalm = landmarks[19];  
                const rightPalm = landmarks[20]; 
                if (leftPalm.visibility > 0.5 && rightPalm.visibility > 0.5) {
                    const dx = leftPalm.x - rightPalm.x;
                    const dy = leftPalm.y - rightPalm.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    const threshold = 0.09; 
                    rawLeftPalm = leftPalm;
                    if (distance < threshold) palmsCollided = true;
                }

                const leftHip = landmarks[23];
                const leftKnee = landmarks[25];
                if (leftHip.visibility > 0.5 && leftKnee.visibility > 0.5) {
                    const currentHipKneeDist = Math.abs(leftKnee.y - leftHip.y);
                    if (currentHipKneeDist > baseHipKneeDist * 1.05) {
                        isStandingNow = true;
                    }
                }
            }

            // 3. 遊戲物理與多重水管邏輯
            if (currentState === STATES.PLAYING) {
                bird.velocity += bird.gravity;
                bird.y += bird.velocity;

                // 控制無敵狀態
                const isInvincible = currentTime < invincibleEndTime;

                // 更新所有水管位置
                for (let i = 0; i < pipes.length; i++) {
                    let p = pipes[i];
                    p.x -= PIPE_CONFIG.speed;

                    // 分數計算
                    if (!p.passed && p.x + PIPE_CONFIG.width < bird.x) {
                        p.passed = true;
                        score++;
                    }

                    // 碰撞偵測 (非無敵狀態)
                    if (!isInvincible) {
                        if (bird.x + bird.radius > p.x && bird.x - bird.radius < p.x + PIPE_CONFIG.width) {
                            if (bird.y - bird.radius < p.topHeight || bird.y + bird.radius > p.topHeight + PIPE_CONFIG.gap) {
                                currentState = STATES.GAMEOVER;
                            }
                        }
                    }
                }

                // 移除移出畫面的水管，並在尾端動態補上新水管
                if (pipes.length > 0 && pipes[0].x < -PIPE_CONFIG.width) {
                    pipes.shift();
                }
                
                // 永遠維持最後一根水管與螢幕邊緣的距離，不間斷生成
                let lastPipe = pipes[pipes.length - 1];
                if (lastPipe && lastPipe.x < WIDTH - PIPE_CONFIG.spawnDist) {
                    pipes.push(createNewPipe(WIDTH));
                }

                // 邊界限制
                if (isInvincible) {
                    if (bird.y - bird.radius < 0) bird.y = bird.radius;
                    if (bird.y + bird.radius > HEIGHT - GROUND_HEIGHT) bird.y = HEIGHT - GROUND_HEIGHT - bird.radius;
                } else {
                    if (bird.y - bird.radius < 0 || bird.y + bird.radius > HEIGHT - GROUND_HEIGHT) {
                        currentState = STATES.GAMEOVER;
                    }
                }

                // 體感操控觸發
                if (palmsCollided) {
                    if (!isPalmsTouching) {
                        triggerFlap();
                        isPalmsTouching = true;
                    }
                } else {
                    isPalmsTouching = false;
                }

                if (isStandingNow && !wasStandingUp) {
                    triggerShield();
                }
                wasStandingUp = isStandingNow;
            }

            // 4. 繪製所有元件
            if (currentState === STATES.PLAYING || currentState === STATES.GAMEOVER) {
                // 渲染多重水管
                pipes.forEach(p => {
                    canvasCtx.fillStyle = '#ff003c';
                    canvasCtx.fillRect(p.x, 0, PIPE_CONFIG.width, p.topHeight);
                    canvasCtx.fillRect(p.x, p.topHeight + PIPE_CONFIG.gap, PIPE_CONFIG.width, HEIGHT - GROUND_HEIGHT - (p.topHeight + PIPE_CONFIG.gap));
                    
                    canvasCtx.strokeStyle = '#ffffff';
                    canvasCtx.lineWidth = 2;
                    canvasCtx.strokeRect(p.x, 0, PIPE_CONFIG.width, p.topHeight);
                    canvasCtx.strokeRect(p.x, p.topHeight + PIPE_CONFIG.gap, PIPE_CONFIG.width, HEIGHT - GROUND_HEIGHT - (p.topHeight + PIPE_CONFIG.gap));
                });

                // 地板
                canvasCtx.fillStyle = '#111';
                canvasCtx.fillRect(0, HEIGHT - GROUND_HEIGHT, WIDTH, GROUND_HEIGHT);
                canvasCtx.fillStyle = '#ff003c';
                canvasCtx.fillRect(0, HEIGHT - GROUND_HEIGHT, WIDTH, 8);

                // 小鳥
                canvasCtx.beginPath();
                canvasCtx.arc(bird.x, bird.y, bird.radius, 0, 2 * Math.PI);
                canvasCtx.fillStyle = '#00ffff';
                canvasCtx.fill();
                canvasCtx.strokeStyle = '#fff';
                canvasCtx.lineWidth = 2;
                canvasCtx.stroke();

                // 量子防護罩
                if (currentState === STATES.PLAYING && currentTime < invincibleEndTime) {
                    canvasCtx.save();
                    canvasCtx.beginPath();
                    canvasCtx.arc(bird.x, bird.y, bird.radius + 15, 0, 2 * Math.PI);
                    canvasCtx.strokeStyle = 'rgba(255, 255, 255, 0.95)'; 
                    canvasCtx.lineWidth = 6;
                    canvasCtx.shadowBlur = 25;
                    canvasCtx.shadowColor = '#00ffff'; 
                    canvasCtx.stroke();
                    canvasCtx.restore();

                    let shieldLeft = ((invincibleEndTime - currentTime) / 1000).toFixed(1);
                    canvasCtx.fillStyle = '#00ffff'; 
                    canvasCtx.font = 'bold 18px Arial';
                    canvasCtx.textAlign = 'center';
                    canvasCtx.fillText(`INVINCIBLE: ${shieldLeft}s`, bird.x, bird.y - bird.radius - 26);
                }

                // 分數
                canvasCtx.fillStyle = '#00ffff';
                canvasCtx.font = 'bold 50px Courier New';
                canvasCtx.textAlign = 'right';
                canvasCtx.fillText(`SCORE: ${score}`, WIDTH - 40, 70);

                // UI
                if (currentState === STATES.PLAYING) {
                    canvasCtx.font = 'bold 20px Arial';
                    canvasCtx.textAlign = 'left';
                    if (currentTime < invincibleEndTime) {
                        canvasCtx.fillStyle = '#00ffff';
                        canvasCtx.fillText("⚡ 矩陣穿梭中！無視密集防線！", 40, HEIGHT - 25);
                    } else if (currentTime < cooldownEndTime) {
                        let cdLeft = ((cooldownEndTime - currentTime) / 1000).toFixed(1);
                        canvasCtx.fillStyle = '#ff9900';
                        canvasCtx.fillText(`⏳ 冷卻中 (CD): ${cdLeft} 秒`, 40, HEIGHT - 25);
                    } else {
                        canvasCtx.fillStyle = '#ff003c';
                        canvasCtx.fillText("💥 警告：遭遇無限水管風暴！起立 或 按 [⬆️鍵] 釋放極限防護罩！", 40, HEIGHT - 25);
                    }
                }
            }

            // 5. 子母畫面
            canvasCtx.save();
            canvasCtx.globalAlpha = 0.4; 
            canvasCtx.translate(PIP.x + PIP.width, PIP.y);
            canvasCtx.scale(-1, 1);
            canvasCtx.drawImage(results.image, 0, 0, PIP.width, PIP.height);
            canvasCtx.restore(); 

            canvasCtx.strokeStyle = '#00ffff';
            canvasCtx.lineWidth = 3;
            canvasCtx.strokeRect(PIP.x, PIP.y, PIP.width, PIP.height);

            if (palmsCollided && rawLeftPalm) {
                let fx = PIP.x + (1 - rawLeftPalm.x) * PIP.width;
                let fy = PIP.y + rawLeftPalm.y * PIP.height;
                canvasCtx.beginPath();
                canvasCtx.arc(fx, fy, 15, 0, 2 * Math.PI);
                canvasCtx.strokeStyle = '#00ffff';
                canvasCtx.lineWidth = 3;
                canvasCtx.stroke();
            }

            // 6. 狀態畫面
            if (currentState === STATES.TESTING) {
                canvasCtx.fillStyle = 'rgba(0, 0, 0, 0.9)';
                canvasCtx.fillRect(0, 0, WIDTH, HEIGHT);

                canvasCtx.fillStyle = '#ff003c';
                canvasCtx.font = 'bold 50px Courier New';
                canvasCtx.textAlign = 'center';
                canvasCtx.fillText("// MULTI-PIPE INFERNO MODE //", WIDTH / 2, HEIGHT / 2 - 60);

                canvasCtx.fillStyle = 'white';
                canvasCtx.font = '22px Arial';
                canvasCtx.fillText("體感：全身入鏡，快速擊掌一次完成陣列同步校正", WIDTH / 2, HEIGHT / 2 - 10);
                canvasCtx.fillStyle = '#00ffff';
                canvasCtx.font = 'bold 20px Arial';
                canvasCtx.fillText("鍵盤：按下 [空白鍵] 或 [向上鍵] 迎擊無限水管牆！", WIDTH / 2, HEIGHT / 2 + 35);

                if (palmsCollided) {
                    if (!isPalmsTouching) {
                        isPalmsTouching = true;
                        testSuccessTimer = 60; 
                        playJumpSound(); 

                        if (results.poseLandmarks) {
                            const l = results.poseLandmarks;
                            if (l[23] && l[25]) {
                                baseHipKneeDist = Math.abs(l[25].y - l[23].y);
                                if(baseHipKneeDist < 0.05) baseHipKneeDist = 0.18; 
                            }
                        }
                    }
                } else {
                    isPalmsTouching = false;
                }

                if (testSuccessTimer > 0) {
                    testSuccessTimer--;
                    canvasCtx.fillStyle = '#00ffff';
                    canvasCtx.font = 'bold 26px Courier New';
                    canvasCtx.fillText("INFINITE MATRIX GENERATED. GOOD LUCK.", WIDTH / 2, HEIGHT / 2 + 100);

                    if (testSuccessTimer === 0) {
                        resetGame();
                    }
                }
            } else if (currentState === STATES.GAMEOVER) {
                canvasCtx.fillStyle = 'rgba(0, 0, 0, 0.85)';
                canvasCtx.fillRect(0, 0, WIDTH, HEIGHT);
                
                canvasCtx.fillStyle = '#ff003c';
                canvasCtx.font = 'bold 80px Courier New';
                canvasCtx.textAlign = 'center';
                canvasCtx.fillText("WALL IMPACT - GAME OVER", WIDTH / 2, HEIGHT / 2);
                
                canvasCtx.fillStyle = 'white';
                canvasCtx.font = '24px Arial';
                canvasCtx.fillText("按鍵盤 'R' 鍵重開，再次挑戰無限彈幕", WIDTH / 2, HEIGHT / 2 + 70);
            }
        });

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                stream.getTracks().forEach(track => track.stop());
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(device => device.kind === 'videoinput');
                cameraSelect.innerHTML = '';
                videoDevices.forEach((device, index) => {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.text = device.label || `Camera ${index + 1}`;
                    cameraSelect.appendChild(option);
                });
                if (videoDevices.length > 0) startNativeCamera(videoDevices[0].deviceId);
            } catch (error) {
                loadingText.innerText = "無法取得硬體權限。";
            }
        }

        async function startNativeCamera(deviceId) {
            if (currentStream) currentStream.getTracks().forEach(track => track.stop());
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: deviceId ? { exact: deviceId } : undefined, width: { ideal: 640 }, height: { ideal: 480 } } });
                videoElement.srcObject = currentStream;
                function onFrameLoop() {
                    if (!currentStream || videoElement.paused || videoElement.ended) return;
                    pose.send({ image: videoElement }).then(() => { requestAnimationFrame(onFrameLoop); }).catch(() => { requestAnimationFrame(onFrameLoop); });
                }
                videoElement.onloadedmetadata = () => { videoElement.play(); requestAnimationFrame(onFrameLoop); };
            } catch (err) { alert("鏡頭驅動失敗！"); }
        }

        cameraSelect.addEventListener('change', (e) => {
            if (currentState !== STATES.LOADING) currentState = STATES.TESTING; 
            startNativeCamera(e.target.value);
        });

        initCamera();
    </script>
</body>
</html>
