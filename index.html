<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>體感/鍵盤雙模 Flappy Bird (暴速地獄防護罩版)</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111;
            font-family: sans-serif;
        }
        canvas {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 28px;
            font-weight: bold;
            color: #ff3333;
            text-align: center;
            z-index: 10;
        }
        #cameraSelectContainer {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 20;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #444;
            display: none;
        }
        #cameraSelectContainer label {
            color: #fff;
            font-size: 14px;
            margin-right: 8px;
        }
        #cameraSelect {
            padding: 4px 8px;
            font-size: 14px;
            background: #222;
            color: #fff;
            border: 1px solid #666;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="loading">載入地獄級 AI 模型與要求攝影機權限中...</div>
    
    <div id="cameraSelectContainer">
        <label for="cameraSelect">📷 選擇鏡頭:</label>
        <select id="cameraSelect"></select>
    </div>

    <video id="video" width="640" height="480" style="display: none;" autoplay playsinline></video>
    <canvas id="gameCanvas" width="1280" height="720"></canvas>

    <script>
        const videoElement = document.getElementById('video');
        const canvasElement = document.getElementById('gameCanvas');
        const canvasCtx = canvasElement.getContext('2d');
        const loadingText = document.getElementById('loading');
        const cameraSelectContainer = document.getElementById('cameraSelectContainer');
        const cameraSelect = document.getElementById('cameraSelect');

        const STATES = {
            LOADING: 'LOADING',
            TESTING: 'TESTING',
            PLAYING: 'PLAYING',
            GAMEOVER: 'GAMEOVER'
        };
        let currentState = STATES.LOADING;

        // --- 【暴速參數調整】遊戲變數 ---
        const WIDTH = canvasElement.width;
        const HEIGHT = canvasElement.height;
        const GROUND_HEIGHT = 50; 
        
        // 大幅提高重力 (0.5 -> 1.2) 與跳躍力 (-10 -> -16)，下墜速度極快
        let bird = { x: WIDTH / 2, y: HEIGHT / 2, radius: 22, velocity: 0, gravity: 1.2, flapPower: -16 };
        // 大幅拉高水管移速 (6 -> 14)，並將安全縫隙縮小 (280 -> 180)
        let pipe = { x: WIDTH, width: 95, gap: 180, speed: 14, topHeight: 0 }; 
        
        let score = 0;
        let isPalmsTouching = false; 
        let testSuccessTimer = 0;
        let audioCtx = null;

        // 起立與無敵狀態變數
        let baseHipKneeDist = 0.18;      
        let wasStandingUp = false;       
        let invincibleEndTime = 0;       
        let cooldownEndTime = 0;         

        const PIP = { x: 30, y: 30, width: 280, height: 157 }; 
        let currentStream = null; 

        // 復古跳躍音效
        function playJumpSound() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'triangle'; 
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(700, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } catch (e) {}
        }

        // 防護罩音效
        function playShieldSound() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'sine'; 
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(950, audioCtx.currentTime + 0.25);
                gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
                osc.start(); osc.stop(audioCtx.currentTime + 0.25);
            } catch (e) {}
        }

        // 大絕招啟動邏輯
        function triggerShield() {
            const currentTime = performance.now();
            if (currentTime > cooldownEndTime) {
                invincibleEndTime = currentTime + 5000; 
                cooldownEndTime = currentTime + 20000;  
                playShieldSound();
            }
        }

        function triggerFlap() {
            bird.velocity = bird.flapPower;
            playJumpSound(); 
        }

        function resetPipe() {
            pipe.x = WIDTH;
            // 配合極窄通道，修正高度分配隨機公式
            pipe.topHeight = Math.floor(Math.random() * (HEIGHT - GROUND_HEIGHT - pipe.gap - 180)) + 90;
        }

        function resetGame() {
            bird.y = HEIGHT / 2;
            bird.velocity = 0;
            score = 0;
            invincibleEndTime = 0;
            cooldownEndTime = 0;
            wasStandingUp = false;
            resetPipe();
            currentState = STATES.PLAYING;
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        }

        // 鍵盤事件監聽（完美保留核心鍵盤操控）
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            
            if (key === 'r' && currentState === STATES.GAMEOVER) {
                resetGame();
            }
            
            if (currentState === STATES.PLAYING) {
                if (e.key === ' ' || key === 'spacebar') { 
                    e.preventDefault(); 
                    triggerFlap();
                }
                if (e.key === 'ArrowUp') { 
                    e.preventDefault();
                    triggerShield();
                }
            }

            if (currentState === STATES.TESTING && (e.key === ' ' || e.key === 'ArrowUp')) {
                resetGame();
            }
        });

        const pose = new Pose({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
        });

        pose.setOptions({
            modelComplexity: 1,
            smoothLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        pose.onResults((results) => {
            if (currentState === STATES.LOADING) {
                loadingText.style.display = 'none';
                cameraSelectContainer.style.display = 'block'; 
                currentState = STATES.TESTING;
            }

            const currentTime = performance.now();

            // 1. 背景：改為深邃的惡魔紫背景
            canvasCtx.fillStyle = '#18002b';
            canvasCtx.fillRect(0, 0, WIDTH, HEIGHT);

            // 2. 骨架偵測
            let palmsCollided = false;
            let rawLeftPalm = null;
            let isStandingNow = false;

            if (results.poseLandmarks) {
                const landmarks = results.poseLandmarks;
                
                // 擊掌偵測
                const leftPalm = landmarks[19];  
                const rightPalm = landmarks[20]; 
                if (leftPalm.visibility > 0.5 && rightPalm.visibility > 0.5) {
                    const dx = leftPalm.x - rightPalm.x;
                    const dy = leftPalm.y - rightPalm.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    const threshold = 0.09; 
                    rawLeftPalm = leftPalm;
                    if (distance < threshold) palmsCollided = true;
                }

                // 起立偵測
                const leftHip = landmarks[23];
                const leftKnee = landmarks[25];
                if (leftHip.visibility > 0.5 && leftKnee.visibility > 0.5) {
                    const currentHipKneeDist = Math.abs(leftKnee.y - leftHip.y);
                    if (currentHipKneeDist > baseHipKneeDist * 1.05) {
                        isStandingNow = true;
                    }
                }
            }

            // 3. 遊戲物理邏輯
            if (currentState === STATES.PLAYING) {
                bird.velocity += bird.gravity;
                bird.y += bird.velocity;

                pipe.x -= pipe.speed;
                if (pipe.x < -pipe.width) {
                    resetPipe();
                    score++;
                }

                // 體感擊掌跳躍
                if (palmsCollided) {
                    if (!isPalmsTouching) {
                        triggerFlap();
                        isPalmsTouching = true;
                    }
                } else {
                    isPalmsTouching = false;
                }

                // 體感挺身起立無敵
                if (isStandingNow && !wasStandingUp) {
                    triggerShield();
                }
                wasStandingUp = isStandingNow;

                const isInvincible = currentTime < invincibleEndTime;

                if (isInvincible) {
                    if (bird.y - bird.radius < 0) bird.y = bird.radius;
                    if (bird.y + bird.radius > HEIGHT - GROUND_HEIGHT) bird.y = HEIGHT - GROUND_HEIGHT - bird.radius;
                } else {
                    if (bird.y - bird.radius < 0 || bird.y + bird.radius > HEIGHT - GROUND_HEIGHT) {
                        currentState = STATES.GAMEOVER;
                    }
                    if (bird.x + bird.radius > pipe.x && bird.x - bird.radius < pipe.x + pipe.width) {
                        if (bird.y - bird.radius < pipe.topHeight || bird.y + bird.radius > pipe.topHeight + pipe.gap) {
                            currentState = STATES.GAMEOVER;
                        }
                    }
                }
            }

            // 4. 繪製元件
            if (currentState === STATES.PLAYING || currentState === STATES.GAMEOVER) {
                // 水管：地獄級警示血紅色
                canvasCtx.fillStyle = '#cf0000';
                canvasCtx.fillRect(pipe.x, 0, pipe.width, pipe.topHeight);
                canvasCtx.fillRect(pipe.x, pipe.topHeight + pipe.gap, pipe.width, HEIGHT - GROUND_HEIGHT - (pipe.topHeight + pipe.gap));
                
                canvasCtx.strokeStyle = '#ff4d4d';
                canvasCtx.lineWidth = 4;
                canvasCtx.strokeRect(pipe.x, 0, pipe.width, pipe.topHeight);
                canvasCtx.strokeRect(pipe.x, pipe.topHeight + pipe.gap, pipe.width, HEIGHT - GROUND_HEIGHT - (pipe.topHeight + pipe.gap));

                // 地板
                canvasCtx.fillStyle = '#3a1a00';
                canvasCtx.fillRect(0, HEIGHT - GROUND_HEIGHT, WIDTH, GROUND_HEIGHT);
                canvasCtx.fillStyle = '#ff3333';
                canvasCtx.fillRect(0, HEIGHT - GROUND_HEIGHT, WIDTH, 12);

                // 小鳥：耀眼亮黃
                canvasCtx.beginPath();
                canvasCtx.arc(bird.x, bird.y, bird.radius, 0, 2 * Math.PI);
                canvasCtx.fillStyle = '#ffcc00';
                canvasCtx.fill();
                canvasCtx.strokeStyle = '#000';
                canvasCtx.lineWidth = 3;
                canvasCtx.stroke();

                // 霓虹亮青色裂空防護罩特效
                if (currentState === STATES.PLAYING && currentTime < invincibleEndTime) {
                    canvasCtx.save();
                    canvasCtx.beginPath();
                    canvasCtx.arc(bird.x, bird.y, bird.radius + 14, 0, 2 * Math.PI);
                    canvasCtx.strokeStyle = 'rgba(0, 255, 255, 0.9)'; 
                    canvasCtx.lineWidth = 5;
                    canvasCtx.shadowBlur = 20;
                    canvasCtx.shadowColor = '#00ffff'; 
                    canvasCtx.stroke();
                    canvasCtx.restore();

                    let shieldLeft = ((invincibleEndTime - currentTime) / 1000).toFixed(1);
                    canvasCtx.fillStyle = '#00ffff'; 
                    canvasCtx.font = 'bold 18px Arial';
                    canvasCtx.textAlign = 'center';
                    canvasCtx.fillText(`無敵: ${shieldLeft}s`, bird.x, bird.y - bird.radius - 24);
                }

                // 分數
                canvasCtx.fillStyle = 'white';
                canvasCtx.strokeStyle = 'black';
                canvasCtx.lineWidth = 6;
                canvasCtx.font = 'bold 45px Arial';
                canvasCtx.textAlign = 'right';
                canvasCtx.strokeText(`Score: ${score}`, WIDTH - 40, 70);
                canvasCtx.fillText(`Score: ${score}`, WIDTH - 40, 70);

                // 大絕招 UI 提示
                if (currentState === STATES.PLAYING) {
                    canvasCtx.font = 'bold 22px Arial';
                    canvasCtx.textAlign = 'left';
                    if (currentTime < invincibleEndTime) {
                        canvasCtx.fillStyle = '#00ffff';
                        canvasCtx.fillText("🔥 裂空防護罩超載運作中！無視一切撞擊！", 40, HEIGHT - 25);
                    } else if (currentTime < cooldownEndTime) {
                        let cdLeft = ((cooldownEndTime - currentTime) / 1000).toFixed(1);
                        canvasCtx.fillStyle = '#ff9900';
                        canvasCtx.fillText(`⏳ 冷卻中 (CD): ${cdLeft} 秒`, 40, HEIGHT - 25);
                    } else {
                        canvasCtx.fillStyle = '#00ff00';
                        canvasCtx.fillText("⚡ 大絕: 挺身起立 或 按 [向上鍵 ⬆️] 強制啟動無敵！", 40, HEIGHT - 25);
                    }
                }
            }

            // 5. 子母畫面視訊鏡頭
            canvasCtx.save();
            canvasCtx.globalAlpha = 0.5; 
            canvasCtx.translate(PIP.x + PIP.width, PIP.y);
            canvasCtx.scale(-1, 1);
            canvasCtx.drawImage(results.image, 0, 0, PIP.width, PIP.height);
            canvasCtx.restore(); 

            canvasCtx.strokeStyle = '#ff0000';
            canvasCtx.lineWidth = 4;
            canvasCtx.strokeRect(PIP.x - 2, PIP.y - 2, PIP.width + 4, PIP.height + 4);

            if (palmsCollided && rawLeftPalm) {
                let fx = PIP.x + (1 - rawLeftPalm.x) * PIP.width;
                let fy = PIP.y + rawLeftPalm.y * PIP.height;
                canvasCtx.beginPath();
                canvasCtx.arc(fx, fy, 15, 0, 2 * Math.PI);
                canvasCtx.strokeStyle = 'cyan';
                canvasCtx.lineWidth = 3;
                canvasCtx.stroke();
            }

            // 6. 狀態機畫面處理
            if (currentState === STATES.TESTING) {
                canvasCtx.fillStyle = 'rgba(0, 0, 0, 0.75)';
                canvasCtx.fillRect(0, 0, WIDTH, HEIGHT);

                canvasCtx.fillStyle = '#ff3333';
                canvasCtx.font = 'bold 45px Arial';
                canvasCtx.textAlign = 'center';
                canvasCtx.fillText("【 暴速地獄版：操控測試 】", WIDTH / 2, HEIGHT / 2 - 60);

                canvasCtx.fillStyle = 'white';
                canvasCtx.font = '24px Arial';
                canvasCtx.fillText("體感：請退後至全身入鏡，並雙手相碰一次進行校正", WIDTH / 2, HEIGHT / 2 - 10);
                canvasCtx.fillStyle = '#ff9999';
                canvasCtx.font = '20px Arial';
                canvasCtx.fillText("鍵盤：可直接按下 [空白鍵] 或 [向上鍵] 瞬間越級開玩！", WIDTH / 2, HEIGHT / 2 + 30);

                if (palmsCollided) {
                    if (!isPalmsTouching) {
                        isPalmsTouching = true;
                        testSuccessTimer = 60; 
                        playJumpSound(); 

                        if (results.poseLandmarks) {
                            const l = results.poseLandmarks;
                            if (l[23] && l[25]) {
                                baseHipKneeDist = Math.abs(l[25].y - l[23].y);
                                if(baseHipKneeDist < 0.05) baseHipKneeDist = 0.18; 
                            }
                        }
                    }
                } else {
                    isPalmsTouching = false;
                }

                if (testSuccessTimer > 0) {
                    testSuccessTimer--;
                    canvasCtx.fillStyle = 'cyan';
                    canvasCtx.font = 'bold 28px Arial';
                    canvasCtx.fillText("極限難度校正完畢！準備迎擊暴速風暴...", WIDTH / 2, HEIGHT / 2 + 90);

                    if (testSuccessTimer === 0) {
                        resetGame();
                    }
                }
            } else if (currentState === STATES.GAMEOVER) {
                canvasCtx.fillStyle = 'rgba(0, 0, 0, 0.75)';
                canvasCtx.fillRect(0, 0, WIDTH, HEIGHT);
                
                canvasCtx.fillStyle = '#ff2222';
                canvasCtx.font = 'bold 75px Arial';
                canvasCtx.textAlign = 'center';
                canvasCtx.fillText("地獄終結 - GAME OVER", WIDTH / 2, HEIGHT / 2);
                
                canvasCtx.fillStyle = 'white';
                canvasCtx.font = '28px Arial';
                canvasCtx.fillText("按下鍵盤 'R' 鍵重新挑戰瘋狂速率", WIDTH / 2, HEIGHT / 2 + 60);
            }
        });

        // 原生 getUserMedia 多鏡頭驅動核心
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                stream.getTracks().forEach(track => track.stop());

                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(device => device.kind === 'videoinput');

                cameraSelect.innerHTML = '';
                videoDevices.forEach((device, index) => {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.text = device.label || `攝影機 ${index + 1}`;
                    cameraSelect.appendChild(option);
                });

                if (videoDevices.length > 0) {
                    startNativeCamera(videoDevices[0].deviceId);
                } else {
                    alert("找不到任何可用的攝影機！");
                }
            } catch (error) {
                console.error("無法初始化攝影機權限:", error);
                loadingText.innerText = "無法取得攝影機權限。";
            }
        }

        async function startNativeCamera(deviceId) {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                currentStream = null;
            }

            const constraints = {
                video: {
                    deviceId: deviceId ? { exact: deviceId } : undefined,
                    width: { ideal: 640 },
                    height: { ideal: 480 }
                }
            };

            try {
                currentStream = await navigator.mediaDevices.getUserMedia(constraints);
                videoElement.srcObject = currentStream;

                function onFrameLoop() {
                    if (!currentStream || videoElement.paused || videoElement.ended) return;
                    pose.send({ image: videoElement }).then(() => {
                        requestAnimationFrame(onFrameLoop);
                    }).catch(err => {
                        console.error("Pose 訊號追蹤錯誤:", err);
                        requestAnimationFrame(onFrameLoop);
                    });
                }

                videoElement.onloadedmetadata = () => {
                    videoElement.play();
                    requestAnimationFrame(onFrameLoop);
                };

            } catch (err) {
                console.error("原生鏡頭硬體調度失敗:", err);
                alert("切換鏡頭失敗！");
            }
        }

        cameraSelect.addEventListener('change', (e) => {
            const selectedDeviceId = e.target.value;
            if (currentState !== STATES.LOADING) {
                currentState = STATES.TESTING; 
            }
            startNativeCamera(selectedDeviceId);
        });

        initCamera();
    </script>
</body>
</html>
